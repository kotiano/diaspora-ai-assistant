<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Kenyan Diaspora{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-name">Kenyan <span class="brand-accent">Diaspora</span></span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">New Request</a>
        <a href="/tasks" class="nav-link {% if request.path.startswith('/tasks') %}active{% endif %}">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Kenyan Diaspora — Connecting the Kenyan diaspora with home</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
